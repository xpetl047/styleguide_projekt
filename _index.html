<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styleguide - v1.0.1</title>
    <style>
        html {
            font-size: 62.5%;
        }
        body {
            font-size: 1.6rem;
        }
        :root {
            --color-primary: #6EDB92;
            --border-radius: .8rem;
            --card-padding: 2.4rem;
            --card-background: #fff;

            --btn-border-radius: .6rem;
            --btn-padding: .8rem 2.4rem;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #c3c3c3;
        }

        .card {
            padding: var(--card-padding);
            background: var(--card-background);
            border-radius: var(--border-radius);
            width: 45rem;
            margin-left: auto;
            margin-right: auto;
        }
        .btn {
            padding: var(--btn-padding);
            border: 0;
            border-radius: var(--btn-border-radius);
            color: #fff;
        }
        .btn-primary {
            background: var(--color-primary);
        }
        .wrapper {
            display: flex;
            height: 100vh;
            align-items: center;
        }
        .form-control {
            display: block;
            width: 100%;
            padding: 1rem;
            border: 0.1rem solid #ccc;
            border-radius: var(--border-radius);
            margin-bottom: 1.6rem;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <!-- TODO:
                + inputs
                + link: forget password
            -->
            <input type="text" name="" id=" " placeholder="Username" class="form-control">
            <input type="password" name="" id=" " placeholder="Password" class="form-control">

            <button class="btn btn-primary">Button</button>
        </div>
    </div>
</body>
</html>
